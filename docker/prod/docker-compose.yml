# ── 启动顺序 ──────────────────────────────────────────────────────────────
# 1. 先启动本编排（创建 fenix-ver-net 并启动 postgres）
# 2. 再启动 docker-compose.ragflow.yml 和 docker-compose.hindsight.yml
#    它们依赖 fenix-ver-net（external: true），必须先有网络才能启动
#
# 启动命令：
#   docker compose -f docker/prod/docker-compose.yml up -d

networks:
    fenix-ver-net:
      driver: bridge

services:
    rcs:
        image: ghcr.io/huangpustar/fenixagent:sha-f00efc9
        container_name: fenix-ver
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
        ports:
            - "38879:3000"
        networks:
            - default
            - fenix-ver-net
        environment:
            TZ: Asia/Shanghai
            LOG_FORMAT: json
            RCS_HOST: 0.0.0.0
            RCS_PORT: 3000
            OPENAI_API_KEY: ${OPENAI_API_KEY}
            OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com/v1/}
            OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-v4-flash}
            RCS_BASE_URL: ${RCS_BASE_URL:-http://localhost:3000}
            HINDSIGHT_MCP_URL: ${HINDSIGHT_MCP_URL:-}
            RCS_API_KEYS: ${RCS_API_KEYS:-}
            # BETTER_AUTH_URL: http://localhost:3000
            REGISTRY_SECRET: ${REGISTRY_SECRET}
            DATABASE_URL: postgres://rcs:rcs@postgres:5432/rcs
            RCS_KNOWLEDGE_PROVIDER: ${RCS_KNOWLEDGE_PROVIDER:-}
            RCS_KNOWLEDGE_BASE_URL: ${RCS_KNOWLEDGE_BASE_URL:-}
            RCS_KNOWLEDGE_API_KEY: ${RCS_KNOWLEDGE_API_KEY:-}
            RAGFLOW_API_URL: ${RAGFLOW_API_URL:-}
            RAGFLOW_API_KEY: ${RAGFLOW_API_KEY:-}
            AGENT_SITES_BASE_URL: http://agent-sites:3000
            AGENT_SITES_MASTER_KEY: ${AGENT_SITES_MASTER_KEY}
            RCS_DEFAULT_MACHINE_ID: ${RCS_DEFAULT_MACHINE_ID:-}
            RCS_DEFAULT_MACHINE_TYPE: ${RCS_DEFAULT_MACHINE_TYPE:-opencode}
            OPENCODE_DISABLE_AUTOUPDATE: "1"
            OPENCODE_DISABLE_TELEMETRY: "1"
            OPENCODE_DISABLE_FFF: true
        volumes:
            - ./data:/app/data
            - ./workflow:/app/workflow
            - ./logs:/app/logs
        command: ["sh", "-lc", "bun migrate.js && exec bun --no-install run dist/index.js"]
        healthcheck:
            test:
                [
                    "CMD",
                    "bun",
                    "-e",
                    "fetch('http://127.0.0.1:3000/health').then((r) => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
                ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 20s

    agent-sites:
        image: ghcr.io/konghayao/agent-sites:v0.3.2
        networks:
          - default
          - fenix-ver-net
        ports:
          - "26778:3000"
        volumes:
          - ./data:/app/data
          - ./public:/app/public
        environment:
          - HOST=0.0.0.0
          - PORT=3000
          - PB_PORT_MIN=9000
          - PB_PORT_MAX=11000
          - MAX_APPS=50
          - AGENT_SITES_MASTER_KEY=${AGENT_SITES_MASTER_KEY}
        restart: unless-stopped

    postgres:
        image: postgres:16-alpine
        container_name: fenix-postgres-ver
        restart: unless-stopped
        networks:
            - fenix-ver-net
        environment:
            TZ: Asia/Shanghai
            POSTGRES_USER: rcs
            POSTGRES_PASSWORD: rcs
            POSTGRES_DB: rcs
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U rcs"]
            interval: 5s
            timeout: 5s
            retries: 5
volumes:
    postgres-data:

