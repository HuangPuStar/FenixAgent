# Sandbox Peri 镜像 — CCB + Peri 客户端模式，连接远程 RCS 主服务器
# Usage:
#   docker compose -f docker/sandbox-peri/docker-compose.yml build
#   docker compose -f docker/sandbox-peri/docker-compose.yml up -d
#   docker compose -f docker/sandbox-peri/docker-compose.yml up -d --scale sandbox-peri=3

services:
    sandbox-peri:
        build:
            context: ../../
            dockerfile: docker/sandbox-peri/Dockerfile
        container_name: rcs-sandbox-peri
        restart: unless-stopped
        environment:
            TZ: Asia/Shanghai
            RCS_URL: ws://rcs:3000
            RCS_SECRET: 340b6908-031d-47de-9cfb-26f75818f969
            RCS_MACHINE_ID: mach_d72e997e_8774_484b_b1f6_e2ccd241d60c
            RCS_MACHINE_NAME: basebox
            RCS_LABELS: sandbox,production
            # 这里需要标记为 ccb
            AGENT_TYPE: ccb
            # 这个 id 设置为空，表示都可以使用
            RCS_TENANT_ID:
        volumes:
            - sandbox-peri-workspaces:/app/workspaces
            - sandbox-peri-global:/app/.peri

volumes:
    sandbox-peri-workspaces:
    sandbox-peri-global:
