# 多机器验收测试 — 启动 2 个 Docker 容器模拟独立 machine
# 每个容器内含 acp-link + opencode，以 client 模式注册到宿主 RCS
#
# 前置条件:
#   1. 宿主 RCS dev server 已在 3000 端口运行
#   2. REGISTRY_SECRET 已设置（默认 test-secret-2026）
#   3. RCS_TENANT_ID 已设置（组织 ID，machine 注册必填）
#
# Usage:
#   RCS_TENANT_ID=org_xxx REGISTRY_SECRET=test-secret-2026 \
#   docker compose -f docker-compose.machines.yml up --build
#   docker compose -f docker-compose.machines.yml down

services:
  machine-a:
    build:
      context: .
      dockerfile: docker/machine/Dockerfile
    container_name: fenix-machine-a
    restart: "no"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - RCS_URL=ws://host.docker.internal:3000
      - RCS_SECRET=${REGISTRY_SECRET:-test-secret-2026}
      - RCS_TENANT_ID=${RCS_TENANT_ID}
      - RCS_LABELS=machine-a,test
    networks:
      - machine-net

  machine-b:
    build:
      context: .
      dockerfile: docker/machine/Dockerfile
    container_name: fenix-machine-b
    restart: "no"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - RCS_URL=ws://host.docker.internal:3000
      - RCS_SECRET=${REGISTRY_SECRET:-test-secret-2026}
      - RCS_TENANT_ID=${RCS_TENANT_ID}
      - RCS_LABELS=machine-b,test
    networks:
      - machine-net

networks:
  machine-net:
    driver: bridge
