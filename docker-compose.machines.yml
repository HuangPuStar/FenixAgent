# 多机器验收测试 — 启动 2 个 Docker 容器模拟独立 machine
# 每个容器内含 acp-link + opencode，以 client 模式注册到宿主 RCS
#
# 前置条件:
#   1. 宿主 RCS dev server 已在 3000 端口运行
#   2. REGISTRY_SECRET 已设置（默认 test-secret-2026）
#   3. ANTHROPIC_API_KEY + ANTHROPIC_BASE_URL 已设置（opencode 需要模型 API）
#   4. Clash Verge 开启"允许局域网连接"（Docker 通过 host.docker.internal:7897 访问外网）
#
# Usage:
#   ANTHROPIC_API_KEY=sk-xxx ANTHROPIC_BASE_URL=https://api.deepseek.com/anthropic \
#   REGISTRY_SECRET=test-secret-2026 docker compose -f docker-compose.machines.yml up --build
#   docker compose -f docker-compose.machines.yml down

services:
  machine-a:
    build:
      context: .
      dockerfile: docker/machine-agent/Dockerfile
      args:
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - http_proxy=
        - https_proxy=
    container_name: fenix-machine-a
    restart: "no"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HTTP_PROXY=http://host.docker.internal:7897
      - HTTPS_PROXY=http://host.docker.internal:7897
      - http_proxy=http://host.docker.internal:7897
      - https_proxy=http://host.docker.internal:7897
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - NO_PROXY=127.0.0.1,localhost,0.0.0.0
      - no_proxy=127.0.0.1,localhost,0.0.0.0
    command:
      - --rcs-url
      - ws://host.docker.internal:3000
      - --rcs-secret
      - ${REGISTRY_SECRET:-test-secret-2026}
      - --labels
      - machine-a,test
      - --
      - opencode
      - acp
    networks:
      - machine-net

  machine-b:
    build:
      context: .
      dockerfile: docker/machine-agent/Dockerfile
      args:
        - HTTP_PROXY=
        - HTTPS_PROXY=
        - http_proxy=
        - https_proxy=
    container_name: fenix-machine-b
    restart: "no"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HTTP_PROXY=http://host.docker.internal:7897
      - HTTPS_PROXY=http://host.docker.internal:7897
      - http_proxy=http://host.docker.internal:7897
      - https_proxy=http://host.docker.internal:7897
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL}
      - NO_PROXY=127.0.0.1,localhost,0.0.0.0
      - no_proxy=127.0.0.1,localhost,0.0.0.0
    command:
      - --rcs-url
      - ws://host.docker.internal:3000
      - --rcs-secret
      - ${REGISTRY_SECRET:-test-secret-2026}
      - --labels
      - machine-b,test
      - --
      - opencode
      - acp
    networks:
      - machine-net

networks:
  machine-net:
    driver: bridge
