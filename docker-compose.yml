# 开发环境 — 只启动周围基础设施，本地用 bun run dev 跑 RCS
# Usage: docker compose up -d

include:
    - ./docker/ragflow/docker-compose.yml

services:

    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: rcs
            POSTGRES_PASSWORD: rcs
            POSTGRES_DB: rcs
        ports:
            - "5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U rcs"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    postgres-data:
